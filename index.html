<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gowtham Tyres | Spin & Win</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo">

    <h1>GOWTHAM TYRES</h1>

    <h3>The Tyre Bazaar</h3>

    <div class="reviewBox">
        ⭐⭐⭐⭐⭐
        <br>
        <strong>Trusted by 2000+ Happy Customers</strong>
        <br>
        Rated 4.9+ on Google
    </div>

    <div class="offer">
        🎉 BNI GRAND OFFER 🎉
        <br>
        Every Visitor Wins!
    </div>

    <form id="registerForm">

        <input
            type="text"
            id="name"
            placeholder="Full Name"
            required>

        <input
            type="tel"
            id="mobile"
            placeholder="Mobile Number"
            required>

        <input
            type="text"
            id="vehicle"
            placeholder="Vehicle Name"
            required>

        <button type="submit">
            🎡 SPIN & WIN
        </button>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
